workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    environment:
      groups:
        - ios_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "io.chaewojido.app"
      node: v22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          # 인증서 임포트
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          KEYCHAIN_PATH=$(security default-keychain | tr -d '"' | xargs)
          security import /tmp/distribution.p12 \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" "$KEYCHAIN_PATH" 2>/dev/null || true
          # 인증서 확인
          security find-identity -v -p codesigning
          # 프로비저닝 프로파일 설치
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Provisioning profile installed"
      - name: Build IPA
        script: |
          set -e
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          security cms -D -i "$PROFILE_PATH" -o /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          CERT_NAME=$(security find-identity -v -p codesigning | grep -E "Apple Distribution|iPhone Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "UUID=$PROFILE_UUID | Team=$TEAM_ID | Cert=$CERT_NAME"
          if [ -z "$CERT_NAME" ]; then
            echo "ERROR: No signing certificate found"
            exit 1
          fi
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_NAME" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
